        bn: "পথটি বাগানের বাইরে আছে। মোট আকৃতি (বাগান + পথ) একটি বড় আয়তক্ষেত্র। বড় আয়তক্ষেত্রের মাপ বের করো।"
      - en: "The path adds 2 m on each side, so: outer length = 18 + 2 + 2 = 22 m, outer width = 12 + 2 + 2 = 16 m. Path area = outer rectangle area − garden area."
        bn: "পথ প্রতিদিকে ২ মিটার যোগ করে: বাইরের দৈর্ঘ্য = ১৮ + ২ + ২ = ২২ মি, বাইরের প্রস্থ = ১২ + ২ + ২ = ১৬ মি। পথের ক্ষেত্রফল = বাইরের আয়তক্ষেত্রের ক্ষেত্রফল − বাগানের ক্ষেত্রফল।"
      - en: "Outer area = 22 × 16 = 352 m². Garden area = 18 × 12 = 216 m². Path area = 352 − 216 = 136 m²."
        bn: "বাইরের ক্ষেত্রফল = ২২ × ১৬ = ৩৫২ বর্গ মিটার। বাগানের ক্ষেত্রফল = ১৮ × ১২ = ২১৬ বর্গ মিটার। পথের ক্ষেত্রফল = ৩৫২ − ২১৬ = ১৩৬ বর্গ মিটার।"

