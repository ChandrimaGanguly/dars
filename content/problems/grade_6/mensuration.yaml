    question_en: "A farmer has a rectangular plot 40 m × 30 m. He wants to grow vegetables in a square section of side 15 m inside the plot. What is the remaining area in m²?"
    question_bn: "একজন কৃষকের একটি ৪০ মি × ৩০ মি আয়তাকার জমি আছে। তিনি জমির ভেতরে ১৫ মিটার বাহুর একটি বর্গাকার অংশে সবজি চাষ করতে চান। বাকি ক্ষেত্রফল কত বর্গ মিটার?"
    bn_reviewed: false
    answer: "975"
    answer_type: numeric
    hints:
      - en: "Find the area of the whole plot first, then subtract the square section's area."
        bn: "প্রথমে পুরো জমির ক্ষেত্রফল বের করো, তারপর বর্গাকার অংশের ক্ষেত্রফল বিয়োগ করো।"
      - en: "Whole plot area = 40 × 30 = 1200 m². Square section area = 15² = 225 m²."
        bn: "পুরো জমির ক্ষেত্রফল = ৪০ × ৩০ = ১২০০ বর্গ মিটার। বর্গাকার অংশের ক্ষেত্রফল = ১৫² = ২২৫ বর্গ মিটার।"
      - en: "Remaining area = 1200 − 225 = 975 m²."
        bn: "বাকি ক্ষেত্রফল = ১২০০ − ২২৫ = ৯৭৫ বর্গ মিটার।"

