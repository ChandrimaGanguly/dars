    hints:
      - en: "Each tile covers an area of 1 m × 1 m = 1 m². To find the number of tiles, first find the total floor area."
        bn: "প্রতিটি টাইল ১ মি × ১ মি = ১ বর্গ মিটার জায়গা ঢাকে। টাইলের সংখ্যা পেতে প্রথমে মোট মেঝের ক্ষেত্রফল বের করো।"
      - en: "Floor area = 10 × 8 = 80 m². Since each tile = 1 m², number of tiles = floor area ÷ tile area."
