      - en: "Area = 25 × 18. Break it down: 25 × 18 = 25 × 20 − 25 × 2."
        bn: "ক্ষেত্রফল = ২৫ × ১৮। ভেঙে নাও: ২৫ × ১৮ = ২৫ × ২০ − ২৫ × ২।"
      - en: "Area = 500 − 50 = 450 m²."
        bn: "ক্ষেত্রফল = ৫০০ − ৫০ = ৪৫০ বর্গ মিটার।"

