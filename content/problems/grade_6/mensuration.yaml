        bn: "ক্ষেত্রফল = ½ × ২৪ × ১৫ = ১৮০ বর্গ মিটার। মোট দাম = ক্ষেত্রফল × প্রতি বর্গ মিটারের দাম।"
      - en: "Total cost = 180 × ₹200 = ₹36,000."
        bn: "মোট দাম = ১৮০ × ₹২০০ = ₹৩৬,০০০।"

