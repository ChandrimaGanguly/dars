    question_en: "A rectangle has an area of 84 cm² and a length of 12 cm. What is its width in cm?"
    question_bn: "একটি আয়তক্ষেত্রের ক্ষেত্রফল ৮৪ বর্গ সেমি এবং দৈর্ঘ্য ১২ সেমি। এর প্রস্থ কত সেমি?"
    bn_reviewed: false
    answer: "7"
    answer_type: numeric
    hints:
      - en: "You know the area and length, but need the width. Use the relationship: Area = length × width."
        bn: "তুমি ক্ষেত্রফল ও দৈর্ঘ্য জানো, প্রস্থ খুঁজতে হবে। সম্পর্ক ব্যবহার করো: ক্ষেত্রফল = দৈর্ঘ্য × প্রস্থ।"
      - en: "Rearrange: width = Area ÷ length = 84 ÷ 12."
        bn: "সাজাও: প্রস্থ = ক্ষেত্রফল ÷ দৈর্ঘ্য = ৮৪ ÷ ১২।"
      - en: "Width = 84 ÷ 12 = 7 cm."
        bn: "প্রস্থ = ৮৪ ÷ ১২ = ৭ সেমি।"

