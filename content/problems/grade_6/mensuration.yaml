        bn: "ত্রিভুজের ক্ষেত্রফল একই ভূমি ও উচ্চতার আয়তক্ষেত্রের অর্ধেক। সূত্র: ক্ষেত্রফল = ½ × ভূমি × উচ্চতা।"
      - en: "Area = ½ × 10 × 6."
        bn: "ক্ষেত্রফল = ½ × ১০ × ৬।"
      - en: "Area = ½ × 60 = 30 cm²."
        bn: "ক্ষেত্রফল = ½ × ৬০ = ৩০ বর্গ সেমি।"

