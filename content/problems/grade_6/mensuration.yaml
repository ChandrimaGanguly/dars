  - grade: 6
    topic: mensuration
    difficulty: 3
    question_en: "Anita wants to put a border of tiles around her 7 m × 4 m rectangular courtyard. Each tile is 50 cm × 50 cm. How many tiles does she need for the border only? (The border is 1 tile wide on all sides.)"
    question_bn: "অনিতা তার ৭ মি × ৪ মি আয়তাকার উঠানের চারদিকে একটি টাইলের সীমানা তৈরি করতে চায়। প্রতিটি টাইল ৫০ সেমি × ৫০ সেমি। সীমানার জন্য কয়টি টাইল লাগবে? (সীমানা সব দিকে ১টি টাইল চওড়া।)"
    bn_reviewed: false
    answer: "40"
    answer_type: numeric
    hints:
      - en: "Convert everything to the same unit. 50 cm = 0.5 m. The whole courtyard in tiles: 7 ÷ 0.5 = 14 tiles long, 4 ÷ 0.5 = 8 tiles wide. The inner area (without border) is 2 tiles smaller each way."
        bn: "সবকিছু একই এককে রূপান্তর করো। ৫০ সেমি = ০.৫ মিটার। টাইলে পুরো উঠান: ৭ ÷ ০.৫ = ১৪টি লম্বায়, ৪ ÷ ০.৫ = ৮টি চওড়ায়। সীমানা ছাড়া ভেতরের অংশ প্রতিদিকে ২ টাইল ছোট।"
      - en: "Total tiles (whole area) = 14 × 8 = 112. Inner area (remove 1-tile border on each side) = (14 − 2) × (8 − 2) = 12 × 6 = 72 tiles."
        bn: "মোট টাইল (পুরো ক্ষেত্রফল) = ১৪ × ৮ = ১১২। ভেতরের ক্ষেত্রফল (প্রতিদিক থেকে ১ টাইল সীমানা সরিয়ে) = (১৪ − ২) × (৮ − ২) = ১২ × ৬ = ৭২টি।"
      - en: "Border tiles = Total − Inner = 112 − 72 = 40 tiles."
        bn: "সীমানার টাইল = মোট − ভেতর = ১১২ − ৭২ = ৪০টি।"

