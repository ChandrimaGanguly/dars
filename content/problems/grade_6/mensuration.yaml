    question_en: "A square has a side of 9 cm. What is its perimeter in cm?"
    question_bn: "একটি বর্গক্ষেত্রের বাহু ৯ সেমি। এর পরিসীমা কত সেমি?"
    bn_reviewed: false
    answer: "36"
    answer_type: numeric
    hints:
      - en: "A square has 4 equal sides. Perimeter means the total length around the outside of a shape."
        bn: "বর্গক্ষেত্রের ৪টি সমান বাহু আছে। পরিসীমা মানে আকৃতির চারদিকের মোট দৈর্ঘ্য।"
      - en: "Perimeter of a square = 4 × side. Here, side = 9 cm."
        bn: "বর্গক্ষেত্রের পরিসীমা = ৪ × বাহু। এখানে, বাহু = ৯ সেমি।"
      - en: "Perimeter = 4 × 9 = 36 cm."
        bn: "পরিসীমা = ৪ × ৯ = ৩৬ সেমি।"

  - grade: 6
    topic: mensuration
    difficulty: 1
    question_en: "A rectangle is 15 cm long and 8 cm wide. What is its perimeter in cm?"
    question_bn: "একটি আয়তক্ষেত্রের দৈর্ঘ্য ১৫ সেমি এবং প্রস্থ ৮ সেমি। এর পরিসীমা কত সেমি?"
    bn_reviewed: false
    answer: "46"
    answer_type: numeric
    hints:
      - en: "A rectangle has two pairs of equal sides — two lengths and two widths. Add all four sides for the perimeter."
        bn: "আয়তক্ষেত্রে দুই জোড়া সমান বাহু আছে — দুটি দৈর্ঘ্য ও দুটি প্রস্থ। পরিসীমার জন্য চারটি বাহু যোগ করো।"
      - en: "Perimeter = 2 × (length + width) = 2 × (15 + 8)."
        bn: "পরিসীমা = ২ × (দৈর্ঘ্য + প্রস্থ) = ২ × (১৫ + ৮)।"
      - en: "Perimeter = 2 × 23 = 46 cm."
        bn: "পরিসীমা = ২ × ২৩ = ৪৬ সেমি।"

