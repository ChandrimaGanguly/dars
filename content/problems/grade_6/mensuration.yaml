      - en: "Perimeter = 2 × (length + width) = 2 × (20 + 12)."
        bn: "পরিসীমা = ২ × (দৈর্ঘ্য + প্রস্থ) = ২ × (২০ + ১২)।"
      - en: "Perimeter = 2 × 32 = 64 m."
