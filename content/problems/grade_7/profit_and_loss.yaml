    - en: "120% of CP = ₹240, so 1% of CP = ₹240 ÷ 120 = ₹2. Therefore CP = 100 × ₹2. What does that come to?"
      bn: "ক্রয়মূল্যের ১২০% = ২৪০ টাকা, তাহলে ১% = ২৪০ ÷ ১২০ = ২ টাকা। সুতরাং ক্রয়মূল্য = ১০০ × ২ টাকা। উত্তরটা কত হয়?"

