  bn_reviewed: false
  answer: "150"
  answer_type: numeric
  hints:
    - en: "You know what profit percentage means. If Rohan wants 25% profit, what does that tell you about how much extra money he needs to earn on top of what he paid?"
      bn: "তুমি জানো profit percentage মানে কী। রোহান যদি ২৫% লাভ করতে চায়, তাহলে সে যা দিয়ে কিনেছে তার উপরে আরও কত টাকা বেশি পেতে হবে?"
