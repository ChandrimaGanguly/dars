- grade: 7
  topic: profit_and_loss
  difficulty: 1
  question_en: "Suresh bought a sack of potatoes for ₹450 and sold it for ₹540. How much profit did he make?"
  question_bn: "সুরেশ একটি বস্তা আলু ৪৫০ টাকায় কিনে ৫৪০ টাকায় বিক্রি করল। সে কত টাকা লাভ করল?"
  bn_reviewed: false
  answer: "90"
  answer_type: numeric
  hints:
    - en: "What does profit mean? Think about the relationship between what something costs to buy and what it sells for."
      bn: "লাভ মানে কী? কোনো জিনিস কিনতে কত লাগে আর বিক্রি করলে কত পাওয়া যায় — এই দুটোর মধ্যে সম্পর্কটা ভাবো।"
    - en: "Profit = Selling Price − Cost Price. What are the selling price and cost price in this problem?"
      bn: "লাভ = বিক্রয়মূল্য − ক্রয়মূল্য। এই সমস্যায় বিক্রয়মূল্য ও ক্রয়মূল্য কত?"
    - en: "Selling Price = ₹540, Cost Price = ₹450. Profit = ₹540 − ₹450. What does that come to?"
      bn: "বিক্রয়মূল্য = ৫৪০ টাকা, ক্রয়মূল্য = ৪৫০ টাকা। লাভ = ৫৪০ − ৪৫০ টাকা। উত্তরটা কত হয়?"

- grade: 7
  topic: profit_and_loss
  difficulty: 1
  question_en: "Fatima bought a basket of tomatoes for ₹60 and could only sell them for ₹48. How much loss did she make?"
  question_bn: "ফাতিমা একটি ঝুড়ি টমেটো ৬০ টাকায় কিনে মাত্র ৪৮ টাকায় বিক্রি করতে পারল। তার কত টাকা ক্ষতি হলো?"
  bn_reviewed: false
  answer: "12"
  answer_type: numeric
  hints:
    - en: "When the selling price is less than the cost price, what do we call that — profit or loss? How is loss calculated?"
      bn: "যখন বিক্রয়মূল্য ক্রয়মূল্যের চেয়ে কম হয়, তখন সেটাকে কী বলে — লাভ নাকি ক্ষতি? ক্ষতি কীভাবে হিসাব করা হয়?"
    - en: "Loss = Cost Price − Selling Price. What are the cost price and selling price in this problem?"
      bn: "ক্ষতি = ক্রয়মূল্য − বিক্রয়মূল্য। এই সমস্যায় ক্রয়মূল্য ও বিক্রয়মূল্য কত?"
    - en: "Cost Price = ₹60, Selling Price = ₹48. Loss = ₹60 − ₹48. What does that come to?"
      bn: "ক্রয়মূল্য = ৬০ টাকা, বিক্রয়মূল্য = ৪৮ টাকা। ক্ষতি = ৬০ − ৪৮ টাকা। উত্তরটা কত হয়?"

- grade: 7
  topic: profit_and_loss
  difficulty: 2
  question_en: "Abdul bought a bag of onions for ₹200 and sold them for ₹250. What is his profit percentage?"
  question_bn: "আবদুল ২০০ টাকায় পেঁয়াজের একটি বস্তা কিনে ২৫০ টাকায় বিক্রি করল। তার লাভের percentage কত?"
  bn_reviewed: false
  answer: "25"
  answer_type: numeric
  hints:
    - en: "You already know how to find profit in rupees. But how do you express that profit as a percentage of what the onions originally cost? Remember — profit percentage is always calculated with respect to the cost price."
      bn: "তুমি ইতিমধ্যে টাকায় লাভ বের করতে জানো। কিন্তু সেই লাভকে পেঁয়াজের আসল দামের percentage হিসেবে কীভাবে প্রকাশ করবে? মনে রেখো — লাভের percentage সবসময় ক্রয়মূল্যের উপর হিসাব করা হয়।"
    - en: "Profit % = (Profit ÷ Cost Price) × 100. Start by finding the profit in rupees, then apply this formula."
      bn: "Profit % = (লাভ ÷ ক্রয়মূল্য) × ১০০। প্রথমে টাকায় লাভ বের করো, তারপর এই সূত্র ব্যবহার করো।"
    - en: "Profit = ₹250 − ₹200 = ₹50. Now, Profit % = (50 ÷ 200) × 100. What does that give you?"
      bn: "লাভ = ২৫০ − ২০০ = ৫০ টাকা। এখন, Profit % = (৫০ ÷ ২০০) × ১০০। উত্তরটা কত হয়?"

