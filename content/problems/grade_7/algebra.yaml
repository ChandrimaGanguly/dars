    question_bn: "যদি p = 2 এবং q = −3 হয়, তাহলে p² − 2pq এর মান কত?"
    bn_reviewed: false
    answer: "16"
    answer_type: numeric
    hints:
      - en: "Substitute p = 2 and q = −3 into the expression. Be careful with signs when multiplying."
        bn: "রাশিতে p = 2 এবং q = −3 প্রতিস্থাপন করো। গুণের সময় চিহ্নের ব্যাপারে সাবধান থাকো।"
      - en: "p² = 2² = 4. 2pq = 2 × 2 × (−3) = −12. So p² − 2pq = 4 − (−12)."
        bn: "p² = 2² = 4। 2pq = 2 × 2 × (−3) = −12। তাই p² − 2pq = 4 − (−12)।"
      - en: "4 − (−12) = 4 + 12 = 16."
        bn: "4 − (−12) = 4 + 12 = 16।"

