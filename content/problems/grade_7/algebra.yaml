        bn: "সংখ্যাটিকে n ধরো। 'দ্বিগুণ করা' মানে 2n। '৩ বিয়োগ' মানে − 3। রাশিকে ১৩ এর সমান করো।"
      - en: "Equation: 2n − 3 = 13. Add 3 to both sides → 2n = 16."
        bn: "সমীকরণ: 2n − 3 = 13। উভয়পক্ষে ৩ যোগ করো → 2n = 16।"
