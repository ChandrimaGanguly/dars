        bn: "২ দিয়ে ভাগ করো → n = 8।"

  - grade: 7
    topic: algebra
    difficulty: 2
    question_en: "Solve for x: x/3 + 4 = 9"
    question_bn: "x এর জন্য সমাধান করো: x/3 + 4 = 9"
    bn_reviewed: false
    answer: "15"
    answer_type: numeric
    hints:
      - en: "First isolate the fraction term. Subtract 4 from both sides."
        bn: "প্রথমে ভগ্নাংশ পদটি আলাদা করো। উভয়পক্ষ থেকে ৪ বিয়োগ করো।"
      - en: "x/3 + 4 − 4 = 9 − 4 → x/3 = 5. Now multiply both sides by 3."
        bn: "x/3 + 4 − 4 = 9 − 4 → x/3 = 5। এখন উভয়পক্ষকে ৩ দিয়ে গুণ করো।"
      - en: "x = 5 × 3 = 15."
        bn: "x = 5 × 3 = 15।"

  # --- HARD (difficulty 3) ---

  - grade: 7
    topic: algebra
    difficulty: 3
    question_en: "The sum of three consecutive integers is 48. Find the smallest integer."
    question_bn: "তিনটি ক্রমিক পূর্ণসংখ্যার যোগফল ৪৮। সবচেয়ে ছোট পূর্ণসংখ্যাটি কত?"
    bn_reviewed: false
    answer: "15"
    answer_type: numeric
    hints:
      - en: "Let the smallest integer be n. Then the three consecutive integers are n, n+1, and n+2."
        bn: "সবচেয়ে ছোট পূর্ণসংখ্যাটিকে n ধরো। তাহলে তিনটি ক্রমিক পূর্ণসংখ্যা হবে n, n+1 এবং n+2।"
      - en: "Their sum: n + (n+1) + (n+2) = 48 → 3n + 3 = 48 → 3n = 45."
        bn: "তাদের যোগফল: n + (n+1) + (n+2) = 48 → 3n + 3 = 48 → 3n = 45।"
      - en: "n = 45 ÷ 3 = 15. The three integers are 15, 16, 17."
        bn: "n = 45 ÷ 3 = 15। তিনটি পূর্ণসংখ্যা হলো 15, 16, 17।"

  - grade: 7
    topic: algebra
    difficulty: 3
    question_en: "Priya is 3 times as old as her brother Sonu. In 4 years, she will be twice Sonu's age. How old is Sonu now?"
    question_bn: "প্রিয়া তার ভাই সোনুর চেয়ে ৩ গুণ বড়। ৪ বছর পরে সে সোনুর দ্বিগুণ বয়সী হবে। সোনুর এখন বয়স কত?"
    bn_reviewed: false
    answer: "4"
    answer_type: numeric
    hints:
      - en: "Let Sonu's current age = x. Then Priya's current age = 3x. In 4 years: Sonu = x + 4, Priya = 3x + 4."
        bn: "সোনুর বর্তমান বয়স = x ধরো। তাহলে প্রিয়ার বর্তমান বয়স = 3x। ৪ বছর পরে: সোনু = x + 4, প্রিয়া = 3x + 4।"
      - en: "In 4 years, Priya = twice Sonu's age: 3x + 4 = 2(x + 4). Expand: 3x + 4 = 2x + 8."
        bn: "৪ বছর পরে, প্রিয়া = সোনুর বয়সের দ্বিগুণ: 3x + 4 = 2(x + 4)। বিস্তার করো: 3x + 4 = 2x + 8।"
      - en: "3x − 2x = 8 − 4 → x = 4. Sonu is 4 years old."
        bn: "3x − 2x = 8 − 4 → x = 4। সোনুর বয়স ৪ বছর।"

  - grade: 7
    topic: algebra
    difficulty: 3
    question_en: "A rectangle's length is 5 more than twice its width. Its perimeter is 52 cm. Find the width in cm."
    question_bn: "একটি আয়তক্ষেত্রের দৈর্ঘ্য তার প্রস্থের দ্বিগুণের চেয়ে ৫ বেশি। পরিসীমা ৫২ সেমি। প্রস্থ কত সেমি?"
    bn_reviewed: false
    answer: "7"
    answer_type: numeric
    hints:
      - en: "Let width = w. Then length = 2w + 5. Use the perimeter formula: P = 2(length + width)."
        bn: "প্রস্থ = w ধরো। তাহলে দৈর্ঘ্য = 2w + 5। পরিসীমার সূত্র ব্যবহার করো: P = 2(দৈর্ঘ্য + প্রস্থ)।"
      - en: "52 = 2((2w + 5) + w) = 2(3w + 5) = 6w + 10. So 6w = 42."
        bn: "52 = 2((2w + 5) + w) = 2(3w + 5) = 6w + 10। তাই 6w = 42।"
      - en: "w = 42 ÷ 6 = 7 cm."
        bn: "w = 42 ÷ 6 = 7 সেমি।"

  - grade: 7
    topic: algebra
    difficulty: 3
    question_en: "If 2(4x − 3) = 3(2x + 2), find x."
    question_bn: "যদি 2(4x − 3) = 3(2x + 2) হয়, তাহলে x এর মান কত?"
    bn_reviewed: false
    answer: "6"
    answer_type: numeric
    hints:
      - en: "Expand both sides by multiplying through the brackets first."
        bn: "প্রথমে বন্ধনী দিয়ে গুণ করে উভয়পক্ষ বিস্তার করো।"
      - en: "Left side: 2(4x − 3) = 8x − 6. Right side: 3(2x + 2) = 6x + 6. Equation: 8x − 6 = 6x + 6."
        bn: "বামপক্ষ: 2(4x − 3) = 8x − 6। ডানপক্ষ: 3(2x + 2) = 6x + 6। সমীকরণ: 8x − 6 = 6x + 6।"
      - en: "8x − 6x = 6 + 6 → 2x = 12 → x = 6."
        bn: "8x − 6x = 6 + 6 → 2x = 12 → x = 6।"
