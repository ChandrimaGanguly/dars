    bn_reviewed: false
    answer: "5"
    answer_type: numeric
    hints:
      - en: "Let the number be x. 'Multiplied by 6 and then 4 is added' → write this as an algebraic expression equal to 34."
        bn: "সংখ্যাটিকে x ধরো। '৬ দিয়ে গুণ করে ৪ যোগ' → এটি বীজগাণিতিক রাশি হিসেবে ৩৪ এর সমান লেখো।"
      - en: "Equation: 6x + 4 = 34. Subtract 4 from both sides → 6x = 30."
        bn: "সমীকরণ: 6x + 4 = 34। উভয়পক্ষ থেকে ৪ বিয়োগ করো → 6x = 30।"
      - en: "Divide both sides by 6 → x = 30 ÷ 6 = 5."
