  question_en: "In an election, Candidate A received 55% of 2,000 votes. How many votes did Candidate A get?"
  question_bn: "একটি নির্বাচনে প্রার্থী A মোট ২,০০০ ভোটের ৫৫% পেলেন। তিনি কতটি ভোট পেলেন?"
  bn_reviewed: false
  answer: "1100"
  answer_type: numeric
  hints:
    - en: "Calculate 55% of 2000. Split 55% into 50% + 5% to make it easier."
      bn: "২০০০-এর ৫৫% হিসাব করো। সহজ করতে ৫৫% কে ৫০% + ৫%-এ ভাগ করো।"
    - en: "50% of 2000 = 1000. 5% of 2000 = 100."
      bn: "২০০০-এর ৫০% = ১০০০। ২০০০-এর ৫% = ১০০।"
    - en: "55% of 2000 = 1000 + 100 = 1100 votes."
      bn: "২০০০-এর ৫৫% = ১০০০ + ১০০ = ১১০০ ভোট।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "After a 20% increase, the price of a vegetable becomes ₹480. What was the original price?"
  question_bn: "২০% বৃদ্ধির পরে একটি সবজির দাম ₹৪৮০ হয়ে গেল। আসল দাম কত ছিল?"
  bn_reviewed: false
  answer: "400"
  answer_type: numeric
  hints:
    - en: "After a 20% increase, the new price = 120% of the original. If new price = ₹480, find 100% of the original."
      bn: "২০% বৃদ্ধির পরে নতুন দাম = আসল দামের ১২০%। যদি নতুন দাম = ₹৪৮০ হয়, তাহলে আসলের ১০০% বের করো।"
    - en: "120% of original = ₹480. So 1% of original = ₹480 ÷ 120."
      bn: "আসলের ১২০% = ₹৪৮০। তাই আসলের ১% = ₹৪৮০ ÷ ১২০।"
    - en: "1% = ₹480 ÷ 120 = ₹4. So 100% = 100 × ₹4 = ₹400. The original price was ₹400."
      bn: "১% = ₹৪৮০ ÷ ১২০ = ₹৪। তাই ১০০% = ১০০ × ₹৪ = ₹৪০০। আসল দাম ছিল ₹৪০০।"

- grade: 7
  topic: percentages
  difficulty: 3
  question_en: "In a class of 60 students, 40% are boys. 25% of the boys play cricket. How many boys play cricket?"
  question_bn: "৬০ জন ছাত্রছাত্রীর একটি শ্রেণিতে ৪০% ছেলে। ছেলেদের ২৫% ক্রিকেট খেলে। কতজন ছেলে ক্রিকেট খেলে?"
  bn_reviewed: false
  answer: "6"
  answer_type: numeric
  hints:
    - en: "Solve in two steps: first find the number of boys, then find 25% of that number."
      bn: "দুটি ধাপে সমাধান করো: প্রথমে ছেলেদের সংখ্যা বের করো, তারপর সেই সংখ্যার ২৫% বের করো।"
    - en: "Step 1: Boys = 40% of 60 = (40/100) × 60 = 24. Step 2: 25% of 24."
      bn: "ধাপ ১: ছেলে = ৬০-এর ৪০% = (৪০/১০০) × ৬০ = ২৪। ধাপ ২: ২৪-এর ২৫%।"
    - en: "25% of 24 = (25/100) × 24 = (1/4) × 24 = 6. So 6 boys play cricket."
      bn: "২৪-এর ২৫% = (২৫/১০০) × ২৪ = (১/৪) × ২৪ = ৬। তাই ৬ জন ছেলে ক্রিকেট খেলে।"

- grade: 7
  topic: percentages
  difficulty: 3
  question_en: "After a 10% salary increase, Abdul earns ₹6,600 per month. What was his original salary?"
  question_bn: "১০% বেতন বৃদ্ধির পরে আবদুল প্রতি মাসে ₹৬,৬০০ উপার্জন করে। তার আসল বেতন কত ছিল?"
  bn_reviewed: false
  answer: "6000"
  answer_type: numeric
  hints:
    - en: "After a 10% increase, the new salary = 110% of the original. If new = ₹6,600, find 100%."
      bn: "১০% বৃদ্ধির পরে নতুন বেতন = আসল বেতনের ১১০%। যদি নতুন = ₹৬,৬০০ হয়, তাহলে ১০০% বের করো।"
    - en: "110% of original = ₹6,600. So 1% of original = ₹6,600 ÷ 110."
      bn: "আসলের ১১০% = ₹৬,৬০০। তাই আসলের ১% = ₹৬,৬০০ ÷ ১১০।"
    - en: "1% = ₹60. So 100% = 100 × ₹60 = ₹6,000. His original salary was ₹6,000."
      bn: "১% = ₹৬০। তাই ১০০% = ১০০ × ₹৬০ = ₹৬,০০০। তার আসল বেতন ছিল ₹৬,০০০।"

- grade: 7
  topic: percentages
  difficulty: 3
  question_en: "Priya scored 75% in a test and received 135 marks. What were the total marks for the test?"
  question_bn: "প্রিয়া একটি পরীক্ষায় ৭৫% পেয়ে ১৩৫ নম্বর পেল। পরীক্ষার মোট নম্বর কত ছিল?"
  bn_reviewed: false
  answer: "180"
  answer_type: numeric
  hints:
    - en: "75% of total marks = 135. Set up: (75/100) × total = 135. Solve for total."
      bn: "মোট নম্বরের ৭৫% = ১৩৫। রাশি লেখো: (৭৫/১০০) × মোট = ১৩৫। মোটের মান বের করো।"
    - en: "Total = 135 ÷ (75/100) = 135 × (100/75). Simplify 135/75 first."
      bn: "মোট = ১৩৫ ÷ (৭৫/১০০) = ১৩৫ × (১০০/৭৫)। প্রথমে ১৩৫/৭৫ সরল করো।"
    - en: "135/75 = 9/5. So total = (9/5) × 100 = 900/5 = 180. The total marks were 180."
      bn: "১৩৫/৭৫ = ৯/৫। তাই মোট = (৯/৫) × ১০০ = ৯০০/৫ = ১৮০। মোট নম্বর ছিল ১৮০।"

- grade: 7
  topic: percentages
  difficulty: 3
  question_en: "A shopkeeper marks up goods by 40% and then gives a 20% discount. What is the net profit percentage?"
  question_bn: "একজন দোকানদার পণ্যের দাম ৪০% বাড়িয়ে চিহ্নিত করে, তারপর ২০% ছাড় দেয়। নিট লাভের শতকরা হার কত?"
  bn_reviewed: false
  answer: "12"
  answer_type: numeric
  hints:
    - en: "Let cost price = ₹100. First apply the 40% markup to find the marked price."
      bn: "ধরো ক্রয়মূল্য = ₹১০০। প্রথমে ৪০% বৃদ্ধি প্রয়োগ করে চিহ্নিত মূল্য বের করো।"
    - en: "Marked price = ₹100 + 40% of ₹100 = ₹140. Now apply 20% discount on ₹140."
      bn: "চিহ্নিত মূল্য = ₹১০০ + ₹১০০-এর ৪০% = ₹১৪০। এখন ₹১৪০-এ ২০% ছাড় প্রয়োগ করো।"
    - en: "Discount = 20% of ₹140 = ₹28. SP = ₹140 − ₹28 = ₹112. Profit = ₹112 − ₹100 = ₹12, so profit % = 12%."
      bn: "ছাড় = ₹১৪০-এর ২০% = ₹২৮। বিক্রয়মূল্য = ₹১৪০ − ₹২৮ = ₹১১২। লাভ = ₹১১২ − ₹১০০ = ₹১২, তাই লাভ % = ১২%।"

- grade: 7
  topic: percentages
  difficulty: 3
  question_en: "The price of petrol increased by 25% in January and then decreased by 20% in February. What is the net percentage change from the original price?"
  question_bn: "জানুয়ারিতে পেট্রলের দাম ২৫% বাড়ল এবং ফেব্রুয়ারিতে ২০% কমল। আসল দামের তুলনায় মোট শতকরা পরিবর্তন কত?"
  bn_reviewed: false
  answer: "0"
  answer_type: numeric
  hints:
    - en: "Apply the changes step by step. Start with ₹100 as the original price and apply the 25% increase first."
      bn: "ধাপে ধাপে পরিবর্তন প্রয়োগ করো। ₹১০০ কে আসল দাম ধরে প্রথমে ২৫% বৃদ্ধি প্রয়োগ করো।"
    - en: "After 25% increase: ₹100 × 1.25 = ₹125. Now apply 20% decrease on ₹125 (not on ₹100!)."
      bn: "২৫% বৃদ্ধির পরে: ₹১০০ × ১.২৫ = ₹১২৫। এখন ₹১২৫-এ ২০% হ্রাস প্রয়োগ করো (₹১০০-এ নয়!)।"
    - en: "20% of ₹125 = ₹25. After decrease: ₹125 − ₹25 = ₹100. The price returns to ₹100 — the net change is 0%."
      bn: "₹১২৫-এর ২০% = ₹২৫। হ্রাসের পরে: ₹১২৫ − ₹২৫ = ₹১০০। দাম আবার ₹১০০-এ ফিরে এসেছে — মোট পরিবর্তন ০%।"

- grade: 7
  topic: percentages
  difficulty: 3
  question_en: "A mixture contains 40 litres of milk and 10 litres of water. What percentage of the mixture is milk?"
  question_bn: "একটি মিশ্রণে ৪০ লিটার দুধ এবং ১০ লিটার জল আছে। মিশ্রণের কত শতাংশ দুধ?"
  bn_reviewed: false
  answer: "80"
  answer_type: numeric
  hints:
    - en: "First find the total volume of the mixture, then calculate milk as a percentage of the total."
      bn: "প্রথমে মিশ্রণের মোট পরিমাণ বের করো, তারপর মোটের শতাংশ হিসেবে দুধ হিসাব করো।"
    - en: "Total = 40 + 10 = 50 litres. Percentage of milk = (40 ÷ 50) × 100."
      bn: "মোট = ৪০ + ১০ = ৫০ লিটার। দুধের শতাংশ = (৪০ ÷ ৫০) × ১০০।"
    - en: "40/50 = 4/5. (4/5) × 100 = 80. Milk is 80% of the mixture."
      bn: "৪০/৫০ = ৪/৫। (৪/৫) × ১০০ = ৮০। মিশ্রণের ৮০% দুধ।"
