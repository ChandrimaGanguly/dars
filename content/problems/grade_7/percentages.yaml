    - en: "Increase = 75 − 60 = 15. Now: (15 ÷ 60) × 100."
      bn: "বৃদ্ধি = ৭৫ − ৬০ = ১৫। এখন: (১৫ ÷ ৬০) × ১০০।"
    - en: "15/60 = 1/4. (1/4) × 100 = 25. The marks increased by 25%."
      bn: "১৫/৬০ = ১/৪। (১/৪) × ১০০ = ২৫। নম্বর ২৫% বৃদ্ধি পেয়েছে।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "A school has 500 students. 48% of them travel by bus. How many students travel by bus?"
  question_bn: "একটি স্কুলে ৫০০ জন ছাত্রছাত্রী আছে। তাদের ৪৮% বাসে যায়। কতজন বাসে যায়?"
  bn_reviewed: false
  answer: "240"
