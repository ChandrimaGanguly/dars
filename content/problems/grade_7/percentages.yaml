- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "Convert 25% to a fraction in its simplest form."
  question_bn: "২৫% কে সরলতম আকারে ভগ্নাংশে প্রকাশ করো।"
  bn_reviewed: false
  answer: "1/4"
  answer_type: text
  hints:
    - en: "Percent means 'per hundred'. So 25% means 25 out of every 100. Write it as a fraction."
      bn: "Percent মানে 'প্রতি শত'। তাই ২৫% মানে প্রতি ১০০-এ ২৫। এটিকে ভগ্নাংশ হিসেবে লেখো।"
    - en: "25% = 25/100. Now simplify. What is the HCF of 25 and 100?"
      bn: "২৫% = ২৫/১০০। এখন সরল করো। ২৫ এবং ১০০-এর গসাগু কত?"
    - en: "HCF(25, 100) = 25. Divide: 25÷25 = 1, 100÷25 = 4. So 25% = 1/4."
      bn: "গসাগু(২৫, ১০০) = ২৫। ভাগ করো: ২৫÷২৫ = ১, ১০০÷২৫ = ৪। তাই ২৫% = ১/৪।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "Convert 3/5 to a percentage."
  question_bn: "৩/৫ কে শতকরায় প্রকাশ করো।"
  bn_reviewed: false
  answer: "60"
  answer_type: numeric
  hints:
    - en: "To convert a fraction to a percentage, multiply by 100."
      bn: "ভগ্নাংশকে শতকরায় রূপান্তর করতে ১০০ দিয়ে গুণ করো।"
    - en: "3/5 × 100 = 300/5. Now divide 300 by 5."
      bn: "৩/৫ × ১০০ = ৩০০/৫। এখন ৩০০ কে ৫ দিয়ে ভাগ করো।"
    - en: "300 ÷ 5 = 60. So 3/5 = 60%."
      bn: "৩০০ ÷ ৫ = ৬০। তাই ৩/৫ = ৬০%।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "Convert 40% to a decimal."
  question_bn: "৪০% কে দশমিকে রূপান্তর করো।"
  bn_reviewed: false
  answer: "0.4"
  answer_type: text
  hints:
    - en: "Percent means per hundred. So 40% = 40/100. Convert this fraction to a decimal."
      bn: "Percent মানে প্রতি শত। তাই ৪০% = ৪০/১০০। এই ভগ্নাংশটি দশমিকে রূপান্তর করো।"
    - en: "Dividing by 100 moves the decimal point two places to the left."
      bn: "১০০ দিয়ে ভাগ করলে দশমিক বিন্দু দুই ঘর বাম দিকে সরে যায়।"
    - en: "40 ÷ 100 = 0.40 = 0.4. So 40% = 0.4."
      bn: "৪০ ÷ ১০০ = ০.৪০ = ০.৪। তাই ৪০% = ০.৪।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "Convert 0.35 to a percentage."
  question_bn: "০.৩৫ কে শতকরায় প্রকাশ করো।"
  bn_reviewed: false
  answer: "35"
  answer_type: numeric
  hints:
    - en: "To convert a decimal to a percentage, multiply by 100."
      bn: "দশমিককে শতকরায় রূপান্তর করতে ১০০ দিয়ে গুণ করো।"
    - en: "Multiplying by 100 moves the decimal point two places to the right."
      bn: "১০০ দিয়ে গুণ করলে দশমিক বিন্দু দুই ঘর ডান দিকে সরে যায়।"
    - en: "0.35 × 100 = 35. So 0.35 = 35%."
      bn: "০.৩৫ × ১০০ = ৩৫। তাই ০.৩৫ = ৩৫%।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "Convert 7/20 to a percentage."
  question_bn: "৭/২০ কে শতকরায় প্রকাশ করো।"
  bn_reviewed: false
  answer: "35"
  answer_type: numeric
  hints:
    - en: "Multiply the fraction by 100: 7/20 × 100."
      bn: "ভগ্নাংশটিকে ১০০ দিয়ে গুণ করো: ৭/২০ × ১০০।"
    - en: "7/20 × 100 = 700/20. Divide 700 by 20."
      bn: "৭/২০ × ১০০ = ৭০০/২০। ৭০০ কে ২০ দিয়ে ভাগ করো।"
    - en: "700 ÷ 20 = 35. So 7/20 = 35%."
      bn: "৭০০ ÷ ২০ = ৩৫। তাই ৭/২০ = ৩৫%।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "Convert 12% to a decimal."
  question_bn: "১২% কে দশমিকে রূপান্তর করো।"
  bn_reviewed: false
  answer: "0.12"
  answer_type: text
  hints:
    - en: "12% means 12 per hundred. Write it as 12/100 and convert to a decimal."
      bn: "১২% মানে প্রতি শত-এ ১২। এটিকে ১২/১০০ হিসেবে লেখো এবং দশমিকে রূপান্তর করো।"
    - en: "Dividing by 100 moves the decimal point two places to the left: 12 becomes 0.12."
      bn: "১০০ দিয়ে ভাগ করলে দশমিক বিন্দু দুই ঘর বাম দিকে সরে যায়: ১২ হয়ে যায় ০.১২।"
    - en: "12 ÷ 100 = 0.12. So 12% = 0.12."
      bn: "১২ ÷ ১০০ = ০.১২। তাই ১২% = ০.১২।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "What is 10% of 250?"
  question_bn: "২৫০-এর ১০% কত?"
  bn_reviewed: false
  answer: "25"
  answer_type: numeric
  hints:
    - en: "10% means 10 per hundred. To find 10% of any number, divide it by 10."
      bn: "১০% মানে প্রতি শত-এ ১০। যেকোনো সংখ্যার ১০% বের করতে সেটিকে ১০ দিয়ে ভাগ করো।"
    - en: "10% of 250 = 250 ÷ 10. What does that come to?"
      bn: "২৫০-এর ১০% = ২৫০ ÷ ১০। উত্তরটা কত হয়?"
    - en: "250 ÷ 10 = 25. So 10% of 250 = 25."
      bn: "২৫০ ÷ ১০ = ২৫। তাই ২৫০-এর ১০% = ২৫।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "What is 50% of 84?"
  question_bn: "৮৪-এর ৫০% কত?"
  bn_reviewed: false
  answer: "42"
  answer_type: numeric
  hints:
    - en: "50% means half. To find 50% of a number, divide it by 2."
      bn: "৫০% মানে অর্ধেক। কোনো সংখ্যার ৫০% বের করতে সেটিকে ২ দিয়ে ভাগ করো।"
    - en: "50% of 84 = 84 ÷ 2. What does that come to?"
      bn: "৮৪-এর ৫০% = ৮৪ ÷ ২। উত্তরটা কত হয়?"
    - en: "84 ÷ 2 = 42. So 50% of 84 = 42."
      bn: "৮৪ ÷ ২ = ৪২। তাই ৮৪-এর ৫০% = ৪২।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "What is 20% of 150?"
  question_bn: "১৫০-এর ২০% কত?"
  bn_reviewed: false
  answer: "30"
  answer_type: numeric
  hints:
    - en: "20% is double 10%. Find 10% of 150 first, then double it."
      bn: "২০% হলো ১০%-এর দ্বিগুণ। প্রথমে ১৫০-এর ১০% বের করো, তারপর দ্বিগুণ করো।"
    - en: "10% of 150 = 150 ÷ 10 = 15. Now double it for 20%."
      bn: "১৫০-এর ১০% = ১৫০ ÷ ১০ = ১৫। এখন ২০%-এর জন্য দ্বিগুণ করো।"
    - en: "20% of 150 = 2 × 15 = 30."
      bn: "১৫০-এর ২০% = ২ × ১৫ = ৩০।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "What is 5% of 200?"
  question_bn: "২০০-এর ৫% কত?"
  bn_reviewed: false
  answer: "10"
  answer_type: numeric
  hints:
    - en: "5% is half of 10%. Find 10% of 200 first, then halve it."
      bn: "৫% হলো ১০%-এর অর্ধেক। প্রথমে ২০০-এর ১০% বের করো, তারপর অর্ধেক করো।"
    - en: "10% of 200 = 200 ÷ 10 = 20. Now halve it for 5%."
      bn: "২০০-এর ১০% = ২০০ ÷ ১০ = ২০। এখন ৫%-এর জন্য অর্ধেক করো।"
    - en: "5% of 200 = 20 ÷ 2 = 10."
      bn: "২০০-এর ৫% = ২০ ÷ ২ = ১০।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "What percentage is 15 of 60?"
  question_bn: "১৫, ৬০-এর কত শতাংশ?"
  bn_reviewed: false
  answer: "25"
  answer_type: numeric
  hints:
    - en: "To find what percentage one number is of another: (part ÷ whole) × 100."
      bn: "একটি সংখ্যা অন্যটির কত শতাংশ বের করতে: (অংশ ÷ সম্পূর্ণ) × ১০০।"
    - en: "(15 ÷ 60) × 100. First simplify 15/60 — what is the HCF of 15 and 60?"
      bn: "(১৫ ÷ ৬০) × ১০০। প্রথমে ১৫/৬০ সরল করো — ১৫ এবং ৬০-এর গসাগু কত?"
    - en: "15/60 = 1/4. Then (1/4) × 100 = 25. So 15 is 25% of 60."
      bn: "১৫/৬০ = ১/৪। তারপর (১/৪) × ১০০ = ২৫। তাই ১৫ হলো ৬০-এর ২৫%।"

- grade: 7
  topic: percentages
  difficulty: 1
  question_en: "What percentage is 8 of 32?"
  question_bn: "৮, ৩২-এর কত শতাংশ?"
  bn_reviewed: false
  answer: "25"
  answer_type: numeric
  hints:
    - en: "Set up: (part ÷ whole) × 100 = (8 ÷ 32) × 100."
      bn: "রাশি লেখো: (অংশ ÷ সম্পূর্ণ) × ১০০ = (৮ ÷ ৩২) × ১০০।"
    - en: "Simplify 8/32 first. Both are divisible by 8: 8÷8=1, 32÷8=4. So 8/32 = 1/4."
      bn: "প্রথমে ৮/৩২ সরল করো। উভয়ই ৮ দিয়ে ভাগযোগ্য: ৮÷৮=১, ৩২÷৮=৪। তাই ৮/৩২ = ১/৪।"
    - en: "(1/4) × 100 = 25. So 8 is 25% of 32."
      bn: "(১/৪) × ১০০ = ২৫। তাই ৮ হলো ৩২-এর ২৫%।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "A shopkeeper increased the price of sugar from ₹40 to ₹50 per kg. What is the percentage increase?"
  question_bn: "একজন দোকানদার চিনির দাম প্রতি কেজি ₹৪০ থেকে বাড়িয়ে ₹৫০ করল। শতকরা বৃদ্ধির হার কত?"
  bn_reviewed: false
  answer: "25"
  answer_type: numeric
  hints:
    - en: "Percentage increase = (increase ÷ original value) × 100. Find the increase in price first."
      bn: "শতকরা বৃদ্ধি = (বৃদ্ধির পরিমাণ ÷ আসল মান) × ১০০। আগে দামের বৃদ্ধির পরিমাণ বের করো।"
    - en: "Increase = ₹50 − ₹40 = ₹10. Now: (10 ÷ 40) × 100."
      bn: "বৃদ্ধি = ₹৫০ − ₹৪০ = ₹১০। এখন: (১০ ÷ ৪০) × ১০০।"
    - en: "(10/40) × 100 = (1/4) × 100 = 25. The price increased by 25%."
      bn: "(১০/৪০) × ১০০ = (১/৪) × ১০০ = ২৫। দাম ২৫% বৃদ্ধি পেয়েছে।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "In a class of 40 students, 60% are girls. How many girls are there?"
  question_bn: "৪০ জন ছাত্রছাত্রীর একটি শ্রেণিতে ৬০% মেয়ে। কতজন মেয়ে আছে?"
  bn_reviewed: false
  answer: "24"
  answer_type: numeric
  hints:
    - en: "60% of the 40 students are girls. Calculate 60% of 40."
      bn: "৪০ জন ছাত্রছাত্রীর ৬০% মেয়ে। ৪০-এর ৬০% হিসাব করো।"
    - en: "60% of 40 = (60/100) × 40 = (60 × 40) ÷ 100."
      bn: "৪০-এর ৬০% = (৬০/১০০) × ৪০ = (৬০ × ৪০) ÷ ১০০।"
    - en: "60 × 40 = 2400. 2400 ÷ 100 = 24. There are 24 girls."
      bn: "৬০ × ৪০ = ২৪০০। ২৪০০ ÷ ১০০ = ২৪। ২৪ জন মেয়ে আছে।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "Rohan scored 72 out of 80 in a test. What was his percentage score?"
  question_bn: "রোহান একটি পরীক্ষায় ৮০-এর মধ্যে ৭২ নম্বর পেল। তার শতকরা নম্বর কত?"
  bn_reviewed: false
  answer: "90"
  answer_type: numeric
  hints:
    - en: "Percentage score = (marks obtained ÷ total marks) × 100."
      bn: "শতকরা নম্বর = (প্রাপ্ত নম্বর ÷ মোট নম্বর) × ১০০।"
    - en: "(72 ÷ 80) × 100. First simplify 72/80 — both are divisible by 8."
      bn: "(৭২ ÷ ৮০) × ১০০। প্রথমে ৭২/৮০ সরল করো — উভয়ই ৮ দিয়ে ভাগযোগ্য।"
    - en: "72/80 = 9/10. Then (9/10) × 100 = 90. Rohan scored 90%."
      bn: "৭২/৮০ = ৯/১০। তারপর (৯/১০) × ১০০ = ৯০। রোহান ৯০% পেয়েছে।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "A shirt costs ₹600. It is on sale at a 15% discount. What is the sale price?"
  question_bn: "একটি জামার দাম ₹৬০০। এটি ১৫% ছাড়ে বিক্রি হচ্ছে। বিক্রয়মূল্য কত?"
  bn_reviewed: false
  answer: "510"
  answer_type: numeric
  hints:
    - en: "A discount reduces the price. Find 15% of ₹600, then subtract from the original price."
      bn: "ছাড় মানে দাম কমে যায়। ₹৬০০-এর ১৫% বের করো, তারপর আসল দাম থেকে বিয়োগ করো।"
    - en: "15% of ₹600 = (15/100) × 600. Split: (10% + 5%) of 600."
      bn: "₹৬০০-এর ১৫% = (১৫/১০০) × ৬০০। ভেঙে করো: ৬০০-এর (১০% + ৫%)।"
    - en: "10% of 600 = 60. 5% of 600 = 30. Discount = 90. Sale price = ₹600 − ₹90 = ₹510."
      bn: "৬০০-এর ১০% = ৬০। ৬০০-এর ৫% = ৩০। ছাড় = ৯০। বিক্রয়মূল্য = ₹৬০০ − ₹৯০ = ₹৫১০।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "What percentage of 120 is 45?"
  question_bn: "১২০-এর কত শতাংশ ৪৫?"
  bn_reviewed: false
  answer: "37.5"
  answer_type: numeric
  hints:
    - en: "Set up: (45 ÷ 120) × 100. Simplify the fraction 45/120 first."
      bn: "রাশি লেখো: (৪৫ ÷ ১২০) × ১০০। প্রথমে ৪৫/১২০ ভগ্নাংশটি সরল করো।"
    - en: "HCF(45, 120) = 15. Simplify: 45÷15 = 3, 120÷15 = 8. So 45/120 = 3/8."
      bn: "গসাগু(৪৫, ১২০) = ১৫। সরল করো: ৪৫÷১৫ = ৩, ১২০÷১৫ = ৮। তাই ৪৫/১২০ = ৩/৮।"
    - en: "(3/8) × 100 = 300/8 = 37.5. So 45 is 37.5% of 120."
      bn: "(৩/৮) × ১০০ = ৩০০/৮ = ৩৭.৫। তাই ৪৫ হলো ১২০-এর ৩৭.৫%।"

