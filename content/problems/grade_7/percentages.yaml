  question_en: "The price of a book decreased from ₹80 to ₹60. What is the percentage decrease?"
  question_bn: "একটি বইয়ের দাম ₹৮০ থেকে কমে ₹৬০ হলো। শতকরা হ্রাসের হার কত?"
  bn_reviewed: false
  answer: "25"
  answer_type: numeric
  hints:
    - en: "Percentage decrease = (decrease ÷ original value) × 100. Find the decrease first."
      bn: "শতকরা হ্রাস = (হ্রাসের পরিমাণ ÷ আসল মান) × ১০০। আগে হ্রাসের পরিমাণ বের করো।"
    - en: "Decrease = ₹80 − ₹60 = ₹20. Now: (20 ÷ 80) × 100."
      bn: "হ্রাস = ₹৮০ − ₹৬০ = ₹২০। এখন: (২০ ÷ ৮০) × ১০০।"
    - en: "20/80 = 1/4. (1/4) × 100 = 25. The price decreased by 25%."
      bn: "২০/৮০ = ১/৪। (১/৪) × ১০০ = ২৫। দাম ২৫% কমেছে।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "35% of a number is 84. What is the number?"
  question_bn: "কোনো সংখ্যার ৩৫% হলো ৮৪। সংখ্যাটি কত?"
  bn_reviewed: false
  answer: "240"
  answer_type: numeric
  hints:
    - en: "If 35% of a number = 84, set up: (35/100) × number = 84. Solve for the number."
      bn: "যদি কোনো সংখ্যার ৩৫% = ৮৪ হয়, তাহলে রাশি লেখো: (৩৫/১০০) × সংখ্যা = ৮৪। সংখ্যার মান বের করো।"
    - en: "Rearrange: number = 84 ÷ (35/100) = 84 × (100/35). Simplify before multiplying."
      bn: "পুনর্বিন্যাস করো: সংখ্যা = ৮৪ ÷ (৩৫/১০০) = ৮৪ × (১০০/৩৫)। গুণ করার আগে সরল করো।"
    - en: "84 × 100/35 = (84÷35) × 100. 84/35 = 12/5. So (12/5) × 100 = 1200/5 = 240."
      bn: "৮৪ × ১০০/৩৫ = (৮৪÷৩৫) × ১০০। ৮৪/৩৫ = ১২/৫। তাই (১২/৫) × ১০০ = ১২০০/৫ = ২৪০।"

- grade: 7
  topic: percentages
  difficulty: 2
  question_en: "A shopkeeper bought a pen for ₹60 and sold it at a 20% profit. What was the selling price?"
  question_bn: "একজন দোকানদার ₹৬০ দিয়ে একটি কলম কিনে ২০% লাভে বিক্রি করল। বিক্রয়মূল্য কত?"
  bn_reviewed: false
  answer: "72"
  answer_type: numeric
  hints:
    - en: "A 20% profit means the selling price is higher than the cost price. Find 20% of ₹60, then add to the cost price."
      bn: "২০% লাভ মানে বিক্রয়মূল্য ক্রয়মূল্যের চেয়ে বেশি। ₹৬০-এর ২০% বের করো, তারপর ক্রয়মূল্যে যোগ করো।"
    - en: "20% of ₹60 = (20/100) × 60 = ₹12. SP = Cost Price + Profit = ₹60 + ₹12."
      bn: "₹৬০-এর ২০% = (২০/১০০) × ৬০ = ₹১২। বিক্রয়মূল্য = ক্রয়মূল্য + লাভ = ₹৬০ + ₹১২।"
    - en: "SP = ₹60 + ₹12 = ₹72."
      bn: "বিক্রয়মূল্য = ₹৬০ + ₹১২ = ₹৭২।"

- grade: 7
  topic: percentages
