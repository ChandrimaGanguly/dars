    - en: "40% of 500 = 200. 8% of 500 = 40. Total = 200 + 40."
      bn: "৫০০-এর ৪০% = ২০০। ৫০০-এর ৮% = ৪০। মোট = ২০০ + ৪০।"
    - en: "48% of 500 = 200 + 40 = 240 students."
      bn: "৫০০-এর ৪৮% = ২০০ + ৪০ = ২৪০ জন ছাত্রছাত্রী।"

- grade: 7
  topic: percentages
