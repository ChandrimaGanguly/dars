    question_en: "Find the Amount when ₹6250 is invested at 4% per annum Compound Interest for 2 years."
    question_bn: "₹৬২৫০ বার্ষিক ৪% চক্রবৃদ্ধি সুদে ২ বছর বিনিয়োগ করলে পরিমাণ কত হবে?"
    bn_reviewed: false
    answer: "6760"
    answer_type: numeric
    hints:
      - en: "A = P(1 + R/100)² = 6250 × (1.04)²."
        bn: "A = P(1 + R/100)² = 6250 × (1.04)²।"
      - en: "(1.04)² = 1.0816. A = 6250 × 1.0816."
        bn: "(1.04)² = 1.0816। A = 6250 × 1.0816।"
      - en: "A = 6250 × 1.0816 = ₹6760."
        bn: "A = 6250 × 1.0816 = ₹6760।"

  # --- HARD (difficulty 3) ---

  - grade: 8
    topic: compound_interest
    difficulty: 3
    question_en: "In how many years will ₹15,625 amount to ₹17,576 at 4% per annum Compound Interest?"
    question_bn: "বার্ষিক ৪% চক্রবৃদ্ধি সুদে ₹১৫,৬২৫ কত বছরে ₹১৭,৫৭৬ হবে?"
    bn_reviewed: false
    answer: "3"
    answer_type: numeric
    hints:
      - en: "Use A = P(1 + R/100)^n → 17576 = 15625 × (1.04)^n. Divide both sides by 15625."
        bn: "A = P(1 + R/100)^n → 17576 = 15625 × (1.04)^n। উভয়পক্ষ ১৫৬২৫ দিয়ে ভাগ করো।"
      - en: "17576 / 15625 = (1.04)^n = 1.124864. Now find what power of 1.04 gives 1.124864."
        bn: "17576 / 15625 = (1.04)^n = 1.124864। এখন কোন ঘাতে 1.04 দিয়ে 1.124864 পাওয়া যায় তা বের করো।"
      - en: "(1.04)¹ = 1.04, (1.04)² = 1.0816, (1.04)³ = 1.0816 × 1.04 = 1.124864. So n = 3 years."
        bn: "(1.04)¹ = 1.04, (1.04)² = 1.0816, (1.04)³ = 1.0816 × 1.04 = 1.124864। তাই n = 3 বছর।"

  - grade: 8
    topic: compound_interest
    difficulty: 3
    question_en: "The Compound Interest on a sum for 2 years is ₹832 and the Simple Interest on the same sum at the same rate for 2 years is ₹800. Find the rate of interest per annum."
    question_bn: "একটি মূলধনের উপর ২ বছরের চক্রবৃদ্ধি সুদ ₹৮৩২ এবং একই মূলধনে একই হারে ২ বছরের সরল সুদ ₹৮০০। বার্ষিক সুদের হার কত?"
    bn_reviewed: false
    answer: "8"
    answer_type: numeric
    hints:
      - en: "The difference CI − SI for 2 years equals P × R² / 10000. Here CI − SI = 832 − 800 = 32."
        bn: "২ বছরের CI − SI = P × R² / 10000। এখানে CI − SI = 832 − 800 = 32।"
      - en: "SI for 1 year = 800/2 = 400, so P × R/100 = 400. Also P × R²/10000 = 32. Divide: R/100 = 32/400 = 0.08."
        bn: "১ বছরের SI = 800/2 = 400, তাই P × R/100 = 400। এবং P × R²/10000 = 32। ভাগ করো: R/100 = 32/400 = 0.08।"
      - en: "R = 0.08 × 100 = 8% per annum. (Check: P = 400×100/8 = 5000. CI = 5000×1.08²−5000 = 832 ✓)"
        bn: "R = 0.08 × 100 = বার্ষিক ৮%। (যাচাই: P = 5000। CI = 5000×1.08²−5000 = 832 ✓)"
