  # --- HARD (difficulty 3) ---

  - grade: 8
    topic: geometry
    difficulty: 3
    question_en: "Find the area of a triangle with sides 13 cm, 13 cm, and 10 cm. (Hint: draw the altitude from the apex to the base to create two right-angled triangles.)"
    question_bn: "১৩ সেমি, ১৩ সেমি এবং ১০ সেমি বাহুবিশিষ্ট একটি ত্রিভুজের ক্ষেত্রফল নির্ণয় করো। (ইঙ্গিত: শীর্ষ থেকে ভূমিতে লম্ব আঁকো।)"
    bn_reviewed: false
    answer: "60"
    answer_type: numeric
    hints:
      - en: "For an isosceles triangle, the altitude from the apex bisects the base. This creates two right-angled triangles — use Pythagoras to find the height."
        bn: "সমদ্বিবাহু ত্রিভুজের শীর্ষ থেকে লম্ব ভূমিকে সমদ্বিখণ্ডিত করে। এটি দুটি সমকোণী ত্রিভুজ তৈরি করে — উচ্চতা খুঁজতে পিথাগোরাস ব্যবহার করো।"
      - en: "The altitude splits the base (10 cm) into two equal parts of 5 cm. In the right triangle: height² = 13² − 5² = 169 − 25 = 144. So height = 12 cm."
        bn: "লম্ব ভূমি (১০ সেমি) কে দুটি সমান ৫ সেমি অংশে ভাগ করে। সমকোণী ত্রিভুজে: উচ্চতা² = 13² − 5² = 169 − 25 = 144। তাই উচ্চতা = ১২ সেমি।"
      - en: "Area = (1/2) × base × height = (1/2) × 10 × 12 = 60 cm²."
        bn: "ক্ষেত্রফল = (1/2) × ভূমি × উচ্চতা = (1/2) × 10 × 12 = 60 বর্গ সেমি।"

  - grade: 8
    topic: geometry
    difficulty: 3
    question_en: "Meena walks 24 m due north, then turns and walks 7 m due east. How far is she from her starting point?"
    question_bn: "মীনা উত্তর দিকে ২৪ মিটার হাঁটে, তারপর মোড় নিয়ে পূর্ব দিকে ৭ মিটার হাঁটে। সে তার শুরুর বিন্দু থেকে কতটা দূরে আছে?"
    bn_reviewed: false
    answer: "25"
    answer_type: numeric
    hints:
      - en: "North and east are perpendicular directions. The path forms a right-angled triangle. The straight-line distance back to the start is the hypotenuse."
        bn: "উত্তর এবং পূর্ব পরস্পর লম্ব দিক। পথটি একটি সমকোণী ত্রিভুজ তৈরি করে। শুরুর বিন্দু পর্যন্ত সরলরেখার দূরত্ব অতিভুজ।"
      - en: "distance² = north² + east² = 24² + 7². Calculate: 24² = 576, 7² = 49."
        bn: "দূরত্ব² = উত্তর² + পূর্ব² = 24² + 7²। হিসাব করো: 24² = 576, 7² = 49।"
      - en: "distance² = 576 + 49 = 625. So distance = √625 = 25 m."
        bn: "দূরত্ব² = 576 + 49 = 625। তাই দূরত্ব = √625 = ২৫ মিটার।"
