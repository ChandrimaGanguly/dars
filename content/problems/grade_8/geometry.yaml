    question_en: "Rohan stands 40 m away from the base of a tower. The distance from his feet to the top of the tower is 50 m. Find the height of the tower."
    question_bn: "রোহান একটি মিনারের গোড়া থেকে ৪০ মিটার দূরে দাঁড়িয়ে আছে। তার পা থেকে মিনারের চূড়া পর্যন্ত দূরত্ব ৫০ মিটার। মিনারের উচ্চতা নির্ণয় করো।"
    bn_reviewed: false
    answer: "30"
    answer_type: numeric
    hints:
      - en: "The tower is vertical, the ground is horizontal, and the slant distance from Rohan to the top is the hypotenuse. Identify the right-angled triangle."
        bn: "মিনার উল্লম্ব, মাটি অনুভূমিক এবং রোহান থেকে চূড়া পর্যন্ত তির্যক দূরত্ব অতিভুজ। সমকোণী ত্রিভুজটি চিনতে পারো।"
      - en: "height² = hypotenuse² − base² = 50² − 40². Calculate: 50² = 2500, 40² = 1600."
        bn: "উচ্চতা² = অতিভুজ² − ভূমি² = 50² − 40²। হিসাব করো: 50² = 2500, 40² = 1600।"
      - en: "height² = 2500 − 1600 = 900. So height = √900 = 30 m."
        bn: "উচ্চতা² = 2500 − 1600 = 900। তাই উচ্চতা = √900 = ৩০ মিটার।"

