  # --- EASY (difficulty 1) ---

  - grade: 8
    topic: geometry
    difficulty: 1
    question_en: "A right-angled triangle has legs of length 3 cm and 4 cm. Find the length of the hypotenuse."
    question_bn: "একটি সমকোণী ত্রিভুজের দুটি সমকোণ-সংলগ্ন বাহু ৩ সেমি এবং ৪ সেমি। অতিভুজের দৈর্ঘ্য নির্ণয় করো।"
    bn_reviewed: false
    answer: "5"
    answer_type: numeric
    hints:
      - en: "In a right-angled triangle, the longest side is called the hypotenuse. There is a famous theorem that connects the three sides."
        bn: "সমকোণী ত্রিভুজে সবচেয়ে বড় বাহুকে অতিভুজ বলে। তিনটি বাহুকে সংযুক্ত করার একটি বিখ্যাত উপপাদ্য আছে।"
      - en: "Pythagoras theorem: hypotenuse² = leg₁² + leg₂². Here hypotenuse² = 3² + 4²."
        bn: "পিথাগোরাসের উপপাদ্য: অতিভুজ² = বাহু₁² + বাহু₂²। এখানে অতিভুজ² = 3² + 4²।"
      - en: "hypotenuse² = 9 + 16 = 25. So hypotenuse = √25 = 5 cm."
        bn: "অতিভুজ² = 9 + 16 = 25। তাই অতিভুজ = √25 = ৫ সেমি।"

  - grade: 8
    topic: geometry
    difficulty: 1
    question_en: "A right-angled triangle has legs of length 5 cm and 12 cm. Find the length of the hypotenuse."
    question_bn: "একটি সমকোণী ত্রিভুজের দুটি সমকোণ-সংলগ্ন বাহু ৫ সেমি এবং ১২ সেমি। অতিভুজের দৈর্ঘ্য নির্ণয় করো।"
    bn_reviewed: false
    answer: "13"
    answer_type: numeric
    hints:
      - en: "Recall Pythagoras theorem — the square of the hypotenuse equals the sum of the squares of the other two sides."
        bn: "পিথাগোরাসের উপপাদ্য মনে করো — অতিভুজের বর্গ অপর দুটি বাহুর বর্গের সমষ্টির সমান।"
      - en: "hypotenuse² = 5² + 12². Calculate each square: 5² = 25, 12² = 144."
        bn: "অতিভুজ² = 5² + 12²। প্রতিটি বর্গ হিসাব করো: 5² = 25, 12² = 144।"
      - en: "hypotenuse² = 25 + 144 = 169. So hypotenuse = √169 = 13 cm."
        bn: "অতিভুজ² = 25 + 144 = 169। তাই অতিভুজ = √169 = ১৩ সেমি।"

  - grade: 8
    topic: geometry
    difficulty: 1
    question_en: "Check whether the triangle with sides 6 cm, 8 cm, and 10 cm is right-angled."
    question_bn: "৬ সেমি, ৮ সেমি এবং ১০ সেমি বাহুবিশিষ্ট ত্রিভুজটি সমকোণী কিনা যাচাই করো।"
    bn_reviewed: false
    answer: "Yes"
    answer_type: text
    hints:
      - en: "To check if a triangle is right-angled, test whether the square of the longest side equals the sum of the squares of the other two sides."
        bn: "একটি ত্রিভুজ সমকোণী কিনা পরীক্ষা করতে, দেখো সবচেয়ে বড় বাহুর বর্গ অপর দুটি বাহুর বর্গের সমষ্টির সমান কিনা।"
      - en: "Longest side = 10 cm. Check: 10² = 6² + 8²? That is 100 = 36 + 64?"
        bn: "সবচেয়ে বড় বাহু = ১০ সেমি। যাচাই: 10² = 6² + 8²? অর্থাৎ 100 = 36 + 64?"
      - en: "36 + 64 = 100. Yes, 10² = 6² + 8², so the triangle IS right-angled."
        bn: "36 + 64 = 100। হ্যাঁ, 10² = 6² + 8², তাই ত্রিভুজটি সমকোণী।"

  - grade: 8
    topic: geometry
    difficulty: 1
    question_en: "In a right-angled triangle, the hypotenuse is 17 cm and one leg is 8 cm. Find the length of the other leg."
    question_bn: "একটি সমকোণী ত্রিভুজের অতিভুজ ১৭ সেমি এবং একটি বাহু ৮ সেমি। অপর বাহুর দৈর্ঘ্য নির্ণয় করো।"
    bn_reviewed: false
    answer: "15"
    answer_type: numeric
    hints:
      - en: "You know the hypotenuse and one leg. Use Pythagoras theorem to find the missing leg."
        bn: "তুমি অতিভুজ এবং একটি বাহু জানো। অজানা বাহু খুঁজে বের করতে পিথাগোরাসের উপপাদ্য ব্যবহার করো।"
      - en: "leg₂² = hypotenuse² − leg₁² = 17² − 8². Calculate: 17² = 289, 8² = 64."
        bn: "বাহু₂² = অতিভুজ² − বাহু₁² = 17² − 8²। হিসাব করো: 17² = 289, 8² = 64।"
      - en: "leg₂² = 289 − 64 = 225. So leg₂ = √225 = 15 cm."
        bn: "বাহু₂² = 289 − 64 = 225। তাই বাহু₂ = √225 = ১৫ সেমি।"

  # --- MEDIUM (difficulty 2) ---

  - grade: 8
    topic: geometry
    difficulty: 2
    question_en: "A ladder 10 m long leans against a wall. Its foot is 6 m away from the base of the wall. How high up the wall does the ladder reach?"
    question_bn: "১০ মিটার লম্বা একটি মই দেয়ালে হেলান দেওয়া আছে। মইটির পা দেয়ালের গোড়া থেকে ৬ মিটার দূরে। মইটি দেয়ালে কতটা উচ্চতায় পৌঁছায়?"
    bn_reviewed: false
    answer: "8"
    answer_type: numeric
    hints:
      - en: "Draw a picture — the wall is vertical, the ground is horizontal, and the ladder is the slanted side. This forms a right-angled triangle. Identify which side is the hypotenuse."
        bn: "একটি ছবি আঁকো — দেয়াল উল্লম্ব, মাটি অনুভূমিক এবং মই তির্যক বাহু। এটি একটি সমকোণী ত্রিভুজ তৈরি করে। অতিভুজটি চিনতে পারো।"
      - en: "The ladder is the hypotenuse (10 m). The base distance is one leg (6 m). height² = 10² − 6²."
        bn: "মইটি অতিভুজ (১০ মি)। ভূমির দূরত্ব একটি বাহু (৬ মি)। উচ্চতা² = 10² − 6²।"
      - en: "height² = 100 − 36 = 64. So height = √64 = 8 m."
        bn: "উচ্চতা² = 100 − 36 = 64। তাই উচ্চতা = √64 = ৮ মিটার।"

  - grade: 8
    topic: geometry
    difficulty: 2
    question_en: "Find the length of the diagonal of a rectangle with length 12 cm and breadth 5 cm."
    question_bn: "১২ সেমি দৈর্ঘ্য এবং ৫ সেমি প্রস্থবিশিষ্ট একটি আয়তক্ষেত্রের কর্ণের দৈর্ঘ্য নির্ণয় করো।"
    bn_reviewed: false
    answer: "13"
    answer_type: numeric
    hints:
      - en: "A diagonal of a rectangle divides it into two right-angled triangles. The diagonal becomes the hypotenuse, and the length and breadth are the two legs."
        bn: "একটি আয়তক্ষেত্রের কর্ণ এটিকে দুটি সমকোণী ত্রিভুজে ভাগ করে। কর্ণটি অতিভুজ হয় এবং দৈর্ঘ্য ও প্রস্থ দুটি বাহু হয়।"
      - en: "diagonal² = length² + breadth² = 12² + 5². Calculate: 12² = 144, 5² = 25."
        bn: "কর্ণ² = দৈর্ঘ্য² + প্রস্থ² = 12² + 5²। হিসাব করো: 12² = 144, 5² = 25।"
      - en: "diagonal² = 144 + 25 = 169. So diagonal = √169 = 13 cm."
        bn: "কর্ণ² = 144 + 25 = 169। তাই কর্ণ = √169 = ১৩ সেমি।"

  - grade: 8
    topic: geometry
