problems:
  # --- EASY (difficulty 1) ---

  - grade: 8
    topic: rational_numbers
    difficulty: 1
    question_en: "Simplify the rational number: 36/48"
    question_bn: "মূলদ সংখ্যাটি সরল করো: 36/48"
    bn_reviewed: false
    answer: "3/4"
    answer_type: text
    hints:
      - en: "To simplify a fraction, find the highest common factor (HCF) of the numerator and denominator, then divide both by it."
        bn: "ভগ্নাংশ সরল করতে, লব এবং হরের সর্বোচ্চ সাধারণ গুণনীয়ক (HCF) খোঁজো, তারপর উভয়কে সেটি দিয়ে ভাগ করো।"
      - en: "HCF of 36 and 48 = 12. Divide both numerator and denominator by 12: 36 ÷ 12 = 3, 48 ÷ 12 = 4."
        bn: "৩৬ এবং ৪৮ এর HCF = ১২। লব এবং হর উভয়কে ১২ দিয়ে ভাগ করো: 36 ÷ 12 = 3, 48 ÷ 12 = 4।"
      - en: "36/48 = 3/4."
        bn: "36/48 = 3/4।"

  - grade: 8
    topic: rational_numbers
    difficulty: 1
    question_en: "Add the rational numbers: 3/7 + 2/7"
    question_bn: "মূলদ সংখ্যাদ্বয় যোগ করো: 3/7 + 2/7"
    bn_reviewed: false
    answer: "5/7"
    answer_type: text
    hints:
      - en: "When two fractions have the same denominator, they are easy to add. Think about what you do with the numerators."
        bn: "দুটি ভগ্নাংশের হর একই হলে, সেগুলো যোগ করা সহজ। লবগুলো নিয়ে কী করতে হয় তা ভাবো।"
      - en: "When denominators are the same, add only the numerators and keep the denominator: (3 + 2)/7."
        bn: "হর একই হলে, শুধু লব যোগ করো এবং হর অপরিবর্তিত রাখো: (3 + 2)/7।"
      - en: "3/7 + 2/7 = (3 + 2)/7 = 5/7."
        bn: "3/7 + 2/7 = (3 + 2)/7 = 5/7।"

  - grade: 8
    topic: rational_numbers
    difficulty: 1
    question_en: "Subtract: 7/9 − 4/9"
    question_bn: "বিয়োগ করো: 7/9 − 4/9"
    bn_reviewed: false
    answer: "1/3"
    answer_type: text
    hints:
      - en: "The denominators are the same. Subtraction of fractions with the same denominator works just like addition — operate on the numerators only."
        bn: "হর একই। একই হরের ভগ্নাংশের বিয়োগ যোগের মতোই কাজ করে — শুধু লবে অপারেশন করো।"
      - en: "Subtract the numerators: (7 − 4)/9 = 3/9. Now simplify 3/9."
        bn: "লব বিয়োগ করো: (7 − 4)/9 = 3/9। এখন 3/9 সরল করো।"
      - en: "3/9 = 1/3 (dividing both by 3)."
        bn: "3/9 = 1/3 (উভয়কে ৩ দিয়ে ভাগ করে)।"

  - grade: 8
    topic: rational_numbers
    difficulty: 1
    question_en: "Which of the following is a rational number? (a) √5   (b) π   (c) −7/3   (d) √2"
    question_bn: "নিচের কোনটি একটি মূলদ সংখ্যা? (a) √5   (b) π   (c) −7/3   (d) √2"
    bn_reviewed: false
    answer: "c"
    answer_type: text
    hints:
      - en: "A rational number can be written in the form p/q where p and q are integers and q ≠ 0. Check which option fits this definition."
        bn: "একটি মূলদ সংখ্যাকে p/q আকারে লেখা যায় যেখানে p এবং q পূর্ণসংখ্যা এবং q ≠ 0। কোন বিকল্পটি এই সংজ্ঞা পূরণ করে তা যাচাই করো।"
      - en: "√5, π, and √2 are irrational — they cannot be expressed as a simple fraction. But −7/3 is already in p/q form where p = −7, q = 3."
        bn: "√5, π এবং √2 অমূলদ — এগুলোকে সরল ভগ্নাংশ হিসেবে প্রকাশ করা যায় না। কিন্তু −7/3 ইতিমধ্যে p/q আকারে আছে যেখানে p = −7, q = 3।"
      - en: "Answer is (c) −7/3. It is a negative rational number."
        bn: "উত্তর হলো (c) −7/3। এটি একটি ঋণাত্মক মূলদ সংখ্যা।"

  # --- MEDIUM (difficulty 2) ---

  - grade: 8
    topic: rational_numbers
    difficulty: 2
    question_en: "Add: 2/3 + 3/4"
    question_bn: "যোগ করো: 2/3 + 3/4"
    bn_reviewed: false
    answer: "17/12"
    answer_type: text
    hints:
      - en: "When fractions have different denominators, you cannot add directly. You need to find the LCM of the denominators first."
        bn: "ভগ্নাংশের হর আলাদা হলে সরাসরি যোগ করা যায় না। প্রথমে হরের LCM খুঁজতে হবে।"
      - en: "LCM of 3 and 4 = 12. Convert: 2/3 = 8/12 and 3/4 = 9/12."
        bn: "৩ এবং ৪ এর LCM = ১২। রূপান্তর করো: 2/3 = 8/12 এবং 3/4 = 9/12।"
      - en: "8/12 + 9/12 = 17/12."
        bn: "8/12 + 9/12 = 17/12।"

  - grade: 8
    topic: rational_numbers
    difficulty: 2
    question_en: "Multiply: (−3/5) × (10/9)"
    question_bn: "গুণ করো: (−3/5) × (10/9)"
    bn_reviewed: false
    answer: "-2/3"
    answer_type: text
    hints:
      - en: "To multiply two rational numbers, multiply their numerators together and their denominators together. Handle the negative sign separately."
        bn: "দুটি মূলদ সংখ্যার গুণ করতে, লবদ্বয় এবং হরদ্বয় আলাদাভাবে গুণ করো। ঋণাত্মক চিহ্নটি আলাদাভাবে পরিচালনা করো।"
      - en: "(−3/5) × (10/9) = (−3 × 10)/(5 × 9) = −30/45. Now simplify −30/45."
        bn: "(−3/5) × (10/9) = (−3 × 10)/(5 × 9) = −30/45। এখন −30/45 সরল করো।"
      - en: "HCF of 30 and 45 = 15. −30/45 = −2/3."
        bn: "৩০ এবং ৪৫ এর HCF = ১৫। −30/45 = −2/3।"

  - grade: 8
    topic: rational_numbers
    difficulty: 2
    question_en: "Find a rational number exactly halfway between 1/3 and 1/2."
    question_bn: "1/3 এবং 1/2 এর ঠিক মাঝামাঝি একটি মূলদ সংখ্যা খোঁজো।"
    bn_reviewed: false
    answer: "5/12"
    answer_type: text
    hints:
      - en: "The rational number exactly between two numbers is their average. To find the average of two numbers, add them and divide by 2."
        bn: "দুটি সংখ্যার ঠিক মাঝামাঝি মূলদ সংখ্যা হলো তাদের গড়। দুটি সংখ্যার গড় নির্ণয় করতে তাদের যোগ করো এবং ২ দিয়ে ভাগ করো।"
      - en: "Average = (1/3 + 1/2) / 2. First find 1/3 + 1/2: LCM of 3 and 2 = 6, so 1/3 + 1/2 = 2/6 + 3/6 = 5/6."
        bn: "গড় = (1/3 + 1/2) / 2। প্রথমে 1/3 + 1/2 নির্ণয় করো: ৩ এবং ২ এর LCM = ৬, তাই 1/3 + 1/2 = 2/6 + 3/6 = 5/6।"
      - en: "Average = (5/6) / 2 = 5/6 × 1/2 = 5/12. The number halfway between 1/3 and 1/2 is 5/12."
        bn: "গড় = (5/6) / 2 = 5/6 × 1/2 = 5/12। 1/3 এবং 1/2 এর মাঝামাঝি সংখ্যাটি 5/12।"

  - grade: 8
    topic: rational_numbers
    difficulty: 2
    question_en: "Divide: (−8/15) ÷ (4/5)"
    question_bn: "ভাগ করো: (−8/15) ÷ (4/5)"
    bn_reviewed: false
    answer: "-2/3"
    answer_type: text
    hints:
      - en: "To divide by a fraction, multiply by its reciprocal. The reciprocal of 4/5 is 5/4."
        bn: "ভগ্নাংশ দিয়ে ভাগ করতে, তার ব্যস্ত ভগ্নাংশ দিয়ে গুণ করো। 4/5 এর ব্যস্ত ভগ্নাংশ হলো 5/4।"
      - en: "(−8/15) ÷ (4/5) = (−8/15) × (5/4) = (−8 × 5)/(15 × 4) = −40/60."
        bn: "(−8/15) ÷ (4/5) = (−8/15) × (5/4) = (−8 × 5)/(15 × 4) = −40/60।"
      - en: "Simplify −40/60: HCF of 40 and 60 = 20. −40/60 = −2/3."
        bn: "−40/60 সরল করো: ৪০ এবং ৬০ এর HCF = ২০। −40/60 = −2/3।"

  # --- HARD (difficulty 3) ---

  - grade: 8
    topic: rational_numbers
    difficulty: 3
    question_en: "Riya has ₹120. She spends 1/3 of it on books and 2/5 of the remainder on stationery. How much money does she have left?"
    question_bn: "রিয়ার কাছে ₹১২০ আছে। সে বইয়ে ১/৩ অংশ এবং বাকি অংশের ২/৫ অংশ কিনেছে। তার কাছে কত টাকা বাকি আছে?"
    bn_reviewed: false
    answer: "48"
    answer_type: numeric
    hints:
      - en: "Work in two steps. First find how much she spent on books, then find the remainder. Then calculate 2/5 of that remainder for stationery."
        bn: "দুটি ধাপে কাজ করো। প্রথমে বইয়ে কত খরচ করেছে নির্ণয় করো, তারপর বাকি অর্থ নির্ণয় করো। তারপর স্টেশনারির জন্য সেই বাকি অংশের ২/৫ হিসাব করো।"
      - en: "Books: (1/3) × 120 = ₹40. Remainder = 120 − 40 = ₹80. Stationery: (2/5) × 80 = ₹32."
        bn: "বই: (1/3) × 120 = ₹৪০। বাকি = 120 − 40 = ₹৮০। স্টেশনারি: (2/5) × 80 = ₹৩২।"
      - en: "Money left = 80 − 32 = ₹48."
        bn: "বাকি টাকা = 80 − 32 = ₹৪৮।"

  - grade: 8
    topic: rational_numbers
    difficulty: 3
    question_en: "Verify the commutative property of addition for rational numbers using p = −2/5 and q = 3/7. Show that p + q = q + p and state the final sum."
    question_bn: "p = −2/5 এবং q = 3/7 ব্যবহার করে মূলদ সংখ্যার যোগের বিনিময় ধর্ম যাচাই করো। দেখাও যে p + q = q + p এবং চূড়ান্ত যোগফল বলো।"
    bn_reviewed: false
    answer: "1/35"
    answer_type: text
    hints:
      - en: "Commutative property means the order of addition does not change the result. Calculate p + q and q + p separately and check they are equal."
        bn: "বিনিময় ধর্ম মানে যোগের ক্রম পরিবর্তন করলে ফলাফল পরিবর্তন হয় না। p + q এবং q + p আলাদাভাবে হিসাব করো এবং দেখো এরা সমান কিনা।"
      - en: "LCM of 5 and 7 = 35. p + q = −2/5 + 3/7 = −14/35 + 15/35 = 1/35. q + p = 3/7 + (−2/5) = 15/35 − 14/35 = 1/35."
        bn: "৫ এবং ৭ এর LCM = ৩৫। p + q = −2/5 + 3/7 = −14/35 + 15/35 = 1/35। q + p = 3/7 + (−2/5) = 15/35 − 14/35 = 1/35।"
      - en: "p + q = q + p = 1/35. The commutative property is verified. The final sum is 1/35."
        bn: "p + q = q + p = 1/35। বিনিময় ধর্ম যাচাই হলো। চূড়ান্ত যোগফল হলো 1/35।"
